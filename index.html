<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Splitter SY</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Image Splitter SY</h1>
        <div class="upload-container">
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            <button class="upload-btn" id="uploadBtn">📤 UPLOAD IMAGE</button>
            <div class="upload-area" id="dropZone">
                <div class="upload-placeholder" id="placeholder">
                    <p>DRAG & DROP</p>
                    <p>OR CLICK TO UPLOAD</p>
                </div>
                <img id="previewImage" style="display: none; max-width: 100%; max-height: 300px; border-radius: 8px;">
            </div>
        </div>
        <div class="split-options">
            <div class="tabs">
                <button class="tab-btn active" data-option="grid">GRID (2 X 2)</button>
                <button class="tab-btn" data-option="vertical">VERTICAL (1 X 2)</button>
                <button class="tab-btn" data-option="horizontal">HORIZONTAL (2 X 1)</button>
                <button class="tab-btn" data-option="custom">CUSTOM (X x Y)</button>
                <button class="tab-btn" data-option="ratio">ASPECT RATIO</button>
            </div>
            <div class="custom-split-options" style="display: none;">
                <input type="number" class="dimension-input" placeholder="X" min="1" max="10">
                <span>x</span>
                <input type="number" class="dimension-input" placeholder="Y" min="1" max="10">
            </div>
            <div class="ratio-options" style="display: none;">
                <div class="ratio-row">
                    <label for="ratioPreset">Ratio:</label>
                    <select id="ratioPreset">
                        <option value="9:16">9:16 Portrait</option>
                        <option value="2:3">2:3 Portrait</option>
                        <option value="4:5">4:5 Portrait</option>
                        <option value="16:9">16:9 Landscape</option>
                        <option value="3:2">3:2 Landscape</option>
                        <option value="5:4">5:4 Landscape</option>
                        <option value="1:1">1:1 Square</option>
                        <option value="custom">Custom...</option>
                    </select>
                </div>
                <div class="ratio-custom-inputs" style="display: none;">
                    <input type="number" id="ratioW" class="dimension-input" placeholder="W" min="1" max="100">
                    <span>:</span>
                    <input type="number" id="ratioH" class="dimension-input" placeholder="H" min="1" max="100">
                </div>
                <div class="ratio-row">
                    <label for="ratioCols">Columns:</label>
                    <input type="number" id="ratioCols" class="dimension-input" value="3" min="1" max="20">
                </div>
                <p id="ratioInfo" class="ratio-info"></p>
            </div>
            <div class="download-preferences">
                <h3>Download Preferences</h3>
                <div class="preference-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="zipOption">
                        <span class="checkmark"></span>
                        Download as ZIP file
                    </label>
                </div>
                <div class="preference-group">
                    <label for="folderSelect">Download Location:</label>
                    <div class="folder-selection">
                        <button type="button" id="folderSelectBtn" class="folder-btn">📁 Choose Folder</button>
                        <span id="selectedFolderPath">Downloads folder (default)</span>
                    </div>
                </div>
            </div>
            <button class="split-btn">SPLIT IMAGE</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
